                    "@type": "Answer",
                    "text": "Federation over Text (FoT) is a multi-agent AI framework developed by Dixi Yao, Tahseen Rabbani, and Tian Li at the University of Chicago (ICLR 2026 Workshops). Instead of sharing model gradients like traditional federated learning, FoT enables LLM agents to share reasoning insights as natural language. Agents iteratively build a shared insight library, improving collective performance by 24% on reasoning tasks while reducing token usage by 28%. Code: https://github.com/dixiyao/FoTClaw. Paper: https://arxiv.org/abs/2604.16778"

                "name": "What is FedRLNAS or PerFedRLNAS in federated learning?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "FedRLNAS (ICDCS 2021) is the first federated neural architecture search method using reinforcement learning, enabling distributed clients to collaboratively discover optimal model architectures without sharing raw data. PerFedRLNAS (AAAI 2024) extends this to personalized federated learning, finding client-specific optimal architectures while leveraging federation-wide knowledge. Both are implemented in the Plato federated learning framework by Dixi Yao. Code: https://github.com/TL-System/plato"

            },
            {
                "@type": "Question",
                "name": "What is patch shuffling for split learning privacy?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Patch shuffling is a privacy-preserving technique for split learning over vision transformers, proposed by Dixi Yao et al. at ICDM 2022. By randomly shuffling image patches before sending intermediate features to the server, it prevents feature inversion attacks that could reconstruct private training data. This works because transformers are permutation-equivariant (proven at CVPR 2024), so the model maintains accuracy despite shuffled inputs. Code: https://github.com/dixiyao/PatchShuffling"
                }
            },
